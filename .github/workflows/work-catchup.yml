name: Báo cáo CÔNG VIỆC bù (sáng hôm sau)

on:
  schedule:
    - cron: "30 0 * * *"   # 07:30 VN — bắt bù NV nhập muộn qua đêm cho NGÀY HÔM TRƯỚC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: work-report
  cancel-in-progress: false

jobs:
  catchup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python report_bot.py work_catchup
      - name: Lưu state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "nstt-bot"
            git config user.email "bot@users.noreply.github.com"
            git pull --rebase --autostash || true
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          fi
