name: Báo cáo CÔNG VIỆC (20h)

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 20:00 VN — dữ liệu hôm nay
  workflow_dispatch:

jobs:
  work:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python report_bot.py work
