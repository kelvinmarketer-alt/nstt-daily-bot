name: Báo cáo sáng (công việc + ads, số liệu hôm trước)

on:
  schedule:
    - cron: "0 2 * * *"    # 09:00 VN
    - cron: "0 4 * * *"    # 11:00 VN — gửi lại nếu NV/ads cập nhật muộn
    - cron: "0 7 * * *"    # 14:00 VN
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python report_bot.py daily
      - name: Lưu state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "nstt-bot"
            git config user.email "bot@users.noreply.github.com"
            git pull --rebase --autostash || true
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          fi
