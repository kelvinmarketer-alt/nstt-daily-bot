name: Báo cáo sáng (công việc + ads, số liệu hôm trước)

on:
  schedule:
    # GitHub Actions chạy scheduled thường TRỄ ~2-4h nên đặt cron sớm hơn để bù.
    - cron: "0 23 * * *"   # cron 06:00 VN -> thực tế ~09:00 VN (báo cáo chính)
    - cron: "0 1 * * *"    # cron 08:00 VN -> ~11:00 VN — gửi lại nếu cập nhật muộn
    - cron: "0 3 * * *"    # cron 10:00 VN -> ~13:00 VN — chốt cuối
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python report_bot.py daily
      - name: Lưu state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "nstt-bot"
            git config user.email "bot@users.noreply.github.com"
            git pull --rebase --autostash || true
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          fi
