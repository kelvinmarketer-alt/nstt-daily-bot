name: Báo cáo ADS (9h sáng)

on:
  schedule:
    - cron: "0 2 * * *"    # 02:00 UTC = 09:00 VN — dữ liệu NGÀY HÔM TRƯỚC
  workflow_dispatch:

jobs:
  ads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python report_bot.py ads
